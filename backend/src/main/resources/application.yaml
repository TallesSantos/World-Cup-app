server:
  port: 8081

joinfaces:
  primefaces:
    theme: saga

  faces:
    project-stage: development
spring:
  application:
    name: 'World Cup api'

  datasource:
    url: jdbc:postgresql://localhost:5432/worldcupdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 12345

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
app:
  world-cups:
    banners-path: '/worldcups_banners'

  players:
    players-image: '/players_image'

  data:
    world-cups-path: './data/WorldCups.csv'
    world-cups-matches-path: './data/WorldCupMatches.csv'
    world-cups-players-path: './data/WorldCupPlayers.csv'

  resource:
    server-side-pattern-path: '/storage/**'
    storage:
      path: 'D:/storage'

  backoffice:
    username: "admin"
    password: "123"

