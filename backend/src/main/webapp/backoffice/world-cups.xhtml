<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:app="http://xmlns.jcp.org/jsf/composite/components">

<h:head>

    <h:outputStylesheet name="theme.css"
                        library="primefaces-#{themeBean.theme}" />

    <title>World Cups</title>
    <style>

        .finished-row {

            background:#dff5df;

        }

    </style>
</h:head>

<h:body>

    <h1>World Cups</h1>

    <app:headerPanel/>

    <h:form id="worldCupForm"
            enctype="multipart/form-data">

        <app:toastMessages/>

        <h2>Filters</h2>

        <h:panelGrid columns="2"
                     cellpadding="5">

            <app:filterField
                    label="Title:"
                    value="#{worldCupBean.filterTitle}" />

            <app:filterField
                    label="Status:"
                    value="#{worldCupBean.filterStatus}" />

            <app:filterField
                    label="Winner:"
                    value="#{worldCupBean.filterWinner}" />

            <h:outputText value="Sort Field:" />

            <h:selectOneMenu value="#{worldCupBean.sortField}">

                <f:selectItem itemValue="title"
                              itemLabel="Title" />

                <f:selectItem itemValue="status"
                              itemLabel="Status" />

                <f:selectItem itemValue="winner"
                              itemLabel="Winner" />

                <app:filterSelect
                        label="Finished:"
                        value="#{worldCupBean.filterFinished}" />

                <f:selectItem itemValue="matchesPlayed"
                              itemLabel="Matches" />

                <f:selectItem itemValue="startDate"
                              itemLabel="Start Date" />

            </h:selectOneMenu>

            <h:outputText value="Sort Direction:" />

            <h:selectOneMenu value="#{worldCupBean.sortDirection}">

                <f:selectItem itemValue="asc"
                              itemLabel="Ascending" />

                <f:selectItem itemValue="desc"
                              itemLabel="Descending" />

            </h:selectOneMenu>

        </h:panelGrid>

        <br/>

        <h:commandButton value="Apply Filters"
                         action="#{worldCupBean.filter}">

            <f:ajax execute="@form"
                    render="@form" />

        </h:commandButton>

        <h:commandButton value="Clear Filters"
                         action="#{worldCupBean.clearFilters}">

            <f:ajax execute="@form"
                    render="@form" />

        </h:commandButton>

        <br/>
        <br/>

        <h:dataTable value="#{worldCupBean.worldCups}"
                     var="worldCup"
                     border="1"
                     cellpadding="6"
                     rowClasses="">

            <f:attribute
                    name="rowStyleClass"
                    value="#{worldCup.audit.finished ? 'finished-row' : ''}" />

            <h:column styleClass="#{auditViewHelper.resolveRowClass(worldCup)}">

                <f:facet name="header">
                    Banner
                </f:facet>

                <h:panelGroup
                        layout="block"
                        style="
                            display:flex;
                            align-items:center;
                            justify-content:space-between;
                            gap:10px;
                            min-width:240px;
                        ">

                    <!-- upload -->

                    <h:panelGroup
                            layout="block"
                            style="
                                display:flex;
                                flex-direction:column;
                                gap:4px;
                            ">

                        <h:inputFile
                                value="#{worldCupBean.uploadedBanners[worldCup.id]}" />

                        <h:commandButton
                                value="#{empty worldCup.worldCupBannerMedia ? 'Add Banner' : 'Replace Banner'}"
                                action="#{worldCupBean.uploadBanner(worldCup)}">

                            <f:ajax execute="@form"
                                    render="@form" />

                        </h:commandButton>

                    </h:panelGroup>

                    <!-- preview -->

                    <h:panelGroup rendered="#{not empty worldCup.worldCupBannerMedia}">

                        <h:graphicImage
                                value="#{sessionBean.baseUrl.concat(worldCup.worldCupBannerMedia.fullResourcePath)}"
                                height="70"
                                style="
                                    border:1px solid gray;
                                    padding:2px;
                                    width:120px;
                                    object-fit:cover;
                                " />

                    </h:panelGroup>

                    <!-- placeholder -->

                    <h:panelGroup
                            rendered="#{empty worldCup.worldCupBannerMedia}"
                            layout="block"
                            style="
                                width:120px;
                                height:70px;
                                border:1px dashed gray;
                                display:flex;
                                align-items:center;
                                justify-content:center;
                                font-size:12px;
                            ">

                        <h:outputText value="No banner" />

                    </h:panelGroup>

                </h:panelGroup>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(worldCup)}">

                <f:facet name="header">
                    Title
                </f:facet>

                <h:inputText value="#{worldCup.title}" />

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(worldCup)}">

                <f:facet name="header">
                    Status
                </f:facet>

                <h:inputText value="#{worldCup.status}" />

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(worldCup)}">

                <f:facet name="header">
                    Hosts
                </f:facet>

                <h:inputText value="#{worldCup.hostCountriesRaw}" />

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(worldCup)}">

                <f:facet name="header">
                    Winner
                </f:facet>

                <h:inputText value="#{worldCup.winner}" />

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(worldCup)}">

                <f:facet name="header">
                    Matches
                </f:facet>

                <h:inputText value="#{worldCup.matchesPlayed}" />

            </h:column>
            <h:column styleClass="#{auditViewHelper.resolveRowClass(worldCup)}">

                <f:facet name="header">
                    Completed
                </f:facet>

                <h:selectOneRadio
                        value="#{worldCup.audit.finished}"
                        layout="lineDirection">

                    <f:selectItem
                            itemValue="false"
                            itemLabel="Open"/>

                    <f:selectItem
                            itemValue="true"
                            itemLabel="Finished"/>

                    <f:ajax
                            execute="@this"
                            render="@this"/>

                </h:selectOneRadio>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(worldCup)}">

                <f:facet name="header">
                    Actions
                </f:facet>

                <h:commandButton value="Save"
                                 action="#{worldCupBean.askSave(worldCup)}">

                    <f:ajax execute="@form"
                            render="@form" />

                </h:commandButton>

                <h:commandButton value="Details [TODO]"
                                 action="#{worldCupBean.selectWorldCup(worldCup)}">

                    <f:ajax render="worldCupDetails" />

                </h:commandButton>

            </h:column>

        </h:dataTable>

        <br/>

        <app:pagination bean="#{worldCupBean}" />

        <br/>

        <app:confirmDialog
                visible="#{not empty worldCupBean.pendingSave}"
                title="Confirm update"
                message="Save changes?"
                confirmAction="#{worldCupBean.confirmSave}"
                cancelAction="#{worldCupBean.cancelSave}" />

    </h:form>

</h:body>

</html>
