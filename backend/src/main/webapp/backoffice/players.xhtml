<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:app="http://xmlns.jcp.org/jsf/composite/components">

<h:head>

    <h:outputStylesheet name="theme.css"
                        library="primefaces-#{themeBean.theme}" />

    <title>Players</title>
    <style>

        .finished-row {

            background:#dff5df;

        }

    </style>
</h:head>

<h:body>

    <h1>Players</h1>

    <app:headerPanel/>

    <h:form id="playersForm"
            enctype="multipart/form-data">

        <app:toastMessages/>

        <h2>Filters</h2>

        <h:panelGrid columns="2" cellpadding="5">

            <app:filterField
                    label="Player:"
                    value="#{playersBean.filterPlayerName}"/>

            <app:filterField
                    label="Team:"
                    value="#{playersBean.filterTeam}"/>

            <app:filterField
                    label="Position:"
                    value="#{playersBean.filterPosition}"/>

            <app:filterSelect
                    label="Finished:"
                    value="#{playersBean.filterFinished}" />

            <h:outputText value="Sort Field:"/>

            <h:outputText value="Sort Direction:"/>

            <h:selectOneMenu
                    value="#{playersBean.sortDirection}">

                <f:selectItem itemValue="asc"
                              itemLabel="Ascending"/>

                <f:selectItem itemValue="desc"
                              itemLabel="Descending"/>

            </h:selectOneMenu>

        </h:panelGrid>

        <br/>

        <h:commandButton value="Apply Filters"
                         action="#{playersBean.filter}">

            <f:ajax execute="@form"
                    render="@form"/>

        </h:commandButton>

        <h:commandButton value="Clear Filters"
                         action="#{playersBean.clearFilters}">

            <f:ajax execute="@form"
                    render="@form"/>

        </h:commandButton>

        <br/>
        <br/>

        <h:dataTable value="#{playersBean.players}"
                     var="player"
                     border="1"
                     cellpadding="6">

            <f:attribute
                    name="rowStyleClass"
                    value="#{player.audit.finished ? 'finished-row' : ''}"/>


            <f:attribute
                    name="rowStyleClass"
                    value="#{player.audit.finished ? 'finished-row' : ''}"/>

            <h:column
                    styleClass="#{auditViewHelper.resolveRowClass(player)}">

                <f:facet name="header">

                    Profile Image

                </f:facet>

                <h:panelGroup
                        layout="block"
                        style="
                display:flex;
                align-items:center;
                justify-content:space-between;
                gap:10px;
                min-width:220px;
            ">

                    <!-- upload -->

                    <h:panelGroup
                            layout="block"
                            style="
                    display:flex;
                    flex-direction:column;
                    gap:4px;
                ">

                        <h:inputFile
                                value="#{playersBean.uploadedProfiles[player.id]}"/>

                        <h:commandButton
                                value="#{empty player.profileImage ? 'Add Image' : 'Replace Image'}"
                                action="#{playersBean.uploadProfileImage(player)}">

                            <f:ajax
                                    execute="@form"
                                    render="@form"/>

                        </h:commandButton>

                    </h:panelGroup>

                    <!-- preview -->

                    <h:panelGroup
                            rendered="#{not empty player.profileImage}">

                        <h:graphicImage
                                value="#{sessionBean.baseUrl.concat(player.profileImage.fullResourcePath)}"
                                height="80"
                                width="80"
                                style="
                        border:1px solid gray;
                        object-fit:cover;
                    "/>

                    </h:panelGroup>

                    <!-- placeholder -->

                    <h:panelGroup
                            rendered="#{empty player.profileImage}"
                            layout="block"
                            style="
                    width:80px;
                    height:80px;
                    border:1px dashed gray;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                ">

                        <h:outputText value="No image"/>

                    </h:panelGroup>

                </h:panelGroup>

            </h:column>



            <h:column styleClass="#{auditViewHelper.resolveRowClass(player)}">

                <f:facet name="header">Player</f:facet>

                <h:inputText value="#{player.playerName}"/>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(player)}">

                <f:facet name="header">Team</f:facet>

                <h:inputText value="#{player.teamInitials}"/>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(player)}">

                <f:facet name="header">Position</f:facet>

                <h:inputText value="#{player.position}"/>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(player)}">

                <f:facet name="header">Common Shirt</f:facet>

                <h:inputText value="#{player.commonShirtNumber}"/>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(player)}">

                <f:facet name="header">
                    Birth Date
                </f:facet>

                <h:inputText
                        value="#{player.birthDate}"/>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(player)}">

                <f:facet name="header">
                    Death Date
                </f:facet>

                <h:inputText
                        value="#{player.deathDate}"/>

            </h:column>

            <h:column
                    styleClass="#{auditViewHelper.resolveRowClass(player)}">

                <f:facet name="header">

                    Completed

                </f:facet>

                <h:selectOneRadio
                        value="#{player.audit.finished}"
                        layout="lineDirection">

                    <f:selectItem
                            itemValue="false"
                            itemLabel="Open"/>

                    <f:selectItem
                            itemValue="true"
                            itemLabel="Finished"/>

                    <f:ajax
                            execute="@this"
                            render="@this"/>

                </h:selectOneRadio>

            </h:column>


            <h:column>

                <f:facet name="header">
                    Actions
                </f:facet>

                <h:commandButton value="Save"
                                 action="#{playersBean.askSave(player)}">

                    <f:ajax execute="@form"
                            render="@form"/>

                </h:commandButton>

                <h:commandButton value="Details [TODO]"
                                 action="#{playersBean.selectPlayer(player)}">

                    <f:ajax render="playersDetails"/>

                </h:commandButton>

            </h:column>

        </h:dataTable>

        <br/>

        <app:pagination bean="#{playersBean}"/>


        <app:confirmDialog
                visible="#{not empty playersBean.pendingSave}"
                title="Confirm update"
                message="Save changes?"
                confirmAction="#{playersBean.confirmSave}"
                cancelAction="#{playersBean.cancelSave}"/>

    </h:form>

</h:body>

</html>
