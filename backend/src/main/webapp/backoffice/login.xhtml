<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:p="http://primefaces.org/ui">

<h:head>
    <title>Login - Backoffice</title>
</h:head>

<h:body>

    <!--
        Redireciona para o index se o usuário já estiver autenticado.
        Usa apenas JSF/PrimeFaces padrão — sem o:importNamespace que foi
        removido no OmniFaces 4.x.
    -->
    <f:metadata>
        <f:viewAction action="#{loginBean.redirectIfAuthenticated}"
                      onPostback="false"/>
    </f:metadata>

    <h1>Backoffice Login</h1>

    <h:form id="loginForm">

        <p:messages id="messages" showDetail="false" closable="true"/>

        <p:panelGrid columns="2" style="margin-bottom: 1rem;">

            <p:outputLabel for="username" value="Usuário"/>
            <p:inputText id="username"
                         value="#{loginBean.username}"
                         required="true"
                         requiredMessage="Informe o usuário."
                         autocomplete="username"/>

            <p:outputLabel for="password" value="Senha"/>
            <p:password id="password"
                        value="#{loginBean.password}"
                        required="true"
                        requiredMessage="Informe a senha."
                        feedback="false"
                        autocomplete="current-password"/>

        </p:panelGrid>

        <p:commandButton value="Entrar"
                         action="#{loginBean.login}"
                         update="messages"
                         icon="pi pi-sign-in"/>

    </h:form>

</h:body>

</html>
