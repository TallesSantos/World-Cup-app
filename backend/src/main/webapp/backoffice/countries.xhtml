<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:app="http://xmlns.jcp.org/jsf/composite/components">

<h:head>

    <title>Countries</title>

    <style>

        .finished-row{

            background:#dff5df;

        }

    </style>

</h:head>

<h:body>

    <h1>Countries</h1>

    <h:form id="countriesForm"
            enctype="multipart/form-data">

        <app:toastMessages/>

        <h2>Filters</h2>

        <h:panelGrid columns="2"
                     cellpadding="5">

            <app:filterField
                    label="Country:"
                    value="#{countriesBean.filterCountryName}"/>

            <app:filterField
                    label="Fifa Code:"
                    value="#{countriesBean.filterFifaCode}"/>

            <h:outputText value="Confederation:"/>

            <h:selectOneMenu value="#{countriesBean.filterCountryConfederationType}">

                <f:selectItem
                        itemLabel="Any Confederation"
                        itemValue="#{null}" />

                <f:selectItems
                        value="#{countriesBean.countryConfederations}"
                        var="conf"
                        itemValue="#{conf}"
                        itemLabel="#{conf.displayName}" />

            </h:selectOneMenu>

            <app:filterSelect
                    label="Finished:"
                    value="#{countriesBean.filterFinished}"/>

            <h:outputText value="Sort Direction:"/>

            <h:selectOneMenu
                    value="#{countriesBean.sortDirection}">

                <f:selectItem itemValue="asc"
                              itemLabel="Ascending"/>

                <f:selectItem itemValue="desc"
                              itemLabel="Descending"/>

            </h:selectOneMenu>

        </h:panelGrid>

        <br/>

        <h:commandButton value="Apply Filters"
                         action="#{countriesBean.filter}">

        </h:commandButton>

        <h:commandButton value="Clear Filters"
                         action="#{countriesBean.clearFilters}">

        </h:commandButton>

        <br/>
        <br/>

        <h:dataTable value="#{countriesBean.countries}"
                     var="country"
                     border="1"
                     cellpadding="6">

            <f:attribute
                    name="rowStyleClass"
                    value="#{country.audit.finished ? 'finished-row' : ''}"/>

            <!-- FLAG -->

            <h:column
                    styleClass="#{auditViewHelper.resolveRowClass(country)}">

                <f:facet name="header">

                    Country Flag

                </f:facet>

                <h:panelGroup
                        layout="block"
                        style="
                display:flex;
                align-items:center;
                justify-content:space-between;
                gap:10px;
                min-width:220px;
            ">

                    <!-- upload -->

                    <h:panelGroup
                            layout="block"
                            style="
                    display:flex;
                    flex-direction:column;
                    gap:4px;
                ">

                        <h:inputFile
                                value="#{countriesBean.uploadedFlags[country.id]}"/>

                        <h:commandButton
                                value="#{empty country.countryFlagImage ? 'Add Flag' : 'Replace Flag'}"
                                action="#{countriesBean.uploadFlag(country)}">

                            <f:ajax
                                    execute="@form"
                                    render="@form"/>

                        </h:commandButton>

                    </h:panelGroup>

                    <!-- preview -->

                    <h:panelGroup
                            rendered="#{not empty country.countryFlagImage}">

                        <h:graphicImage
                                value="#{'http://localhost:8081'.concat(country.countryFlagImage.fullResourcePath)}"
                                height="80"
                                width="80"
                                style="
                        border:1px solid gray;
                        object-fit:cover;
                    "/>

                    </h:panelGroup>

                    <!-- placeholder -->

                    <h:panelGroup
                            rendered="#{empty country.countryFlagImage}"
                            layout="block"
                            style="
                    width:80px;
                    height:80px;
                    border:1px dashed gray;
                    display:flex;
                    align-items:center;
                    justify-content:center;
                ">

                        <h:outputText value="No image"/>

                    </h:panelGroup>

                </h:panelGroup>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(country)}">

                <f:facet name="header">Name</f:facet>

                <h:inputText value="#{country.name}"/>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(country)}">

                <f:facet name="header">Initials</f:facet>

                <h:inputText value="#{country.initials}"/>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(country)}">

                <f:facet name="header">Fifa Code</f:facet>

                <h:inputText value="#{country.fifaCode}"/>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(country)}">

                <f:facet name="header">Ranking</f:facet>

                <h:inputText value="#{country.fifaRanking}"/>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(country)}">

                <f:facet name="header">
                    Confederation
                </f:facet>

                <h:selectOneMenu value="#{country.confederation}">

                    <!-- opção null -->
                    <f:selectItem
                            itemLabel="Select Confederation"
                            itemValue="#{null}"
                            noSelectionOption="true"/>

                    <!-- enum -->
                    <f:selectItems
                            value="#{countriesBean.countryConfederations}"
                            var="conf"
                            itemValue="#{conf}"
                            itemLabel="#{conf.displayName}"/>

                </h:selectOneMenu>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(country)}">

                <f:facet name="header">

                    Completed

                </f:facet>

                <h:selectOneRadio
                        value="#{country.audit.finished}"
                        layout="lineDirection">

                    <f:selectItem itemValue="false"
                                  itemLabel="Open"/>

                    <f:selectItem itemValue="true"
                                  itemLabel="Finished"/>

                </h:selectOneRadio>

            </h:column>

            <h:column styleClass="#{auditViewHelper.resolveRowClass(country)}">

                <f:facet name="header">

                    Actions

                </f:facet>

                <h:commandButton
                        value="Save"
                        action="#{countriesBean.askSave(country)}">
                </h:commandButton>

                <h:commandButton value="Details [TODO]"
                                 action="#{worldCupBean.selectWorldCup(worldCup)}">

                    <f:ajax render="worldCupDetails" />

                </h:commandButton>

            </h:column>

        </h:dataTable>

        <br/>

        <app:pagination bean="#{countriesBean}"/>

        <app:confirmDialog
                visible="#{not empty countriesBean.pendingSave}"
                title="Confirm update"
                message="Save changes?"
                confirmAction="#{countriesBean.confirmSave}"
                cancelAction="#{countriesBean.cancelSave}"/>

    </h:form>

</h:body>

</html>
