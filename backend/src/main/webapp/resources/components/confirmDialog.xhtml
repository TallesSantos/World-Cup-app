<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:cc="jakarta.faces.composite">

<cc:interface>

    <cc:attribute name="visible" required="true"/>

    <cc:attribute name="title" required="true"/>

    <cc:attribute name="message" required="true"/>

    <cc:attribute name="confirmAction"
                  method-signature="void action()"
                  required="true"/>

    <cc:attribute name="cancelAction"
                  method-signature="void action()"
                  required="true"/>

</cc:interface>

<cc:implementation>

    <h:panelGroup rendered="#{cc.attrs.visible}">

        <!-- BACKDROP -->

        <div style="
            position:fixed;
            top:0;
            left:0;
            width:100vw;
            height:100vh;
            background:rgba(0,0,0,0.5);
            z-index:9998;
        ">
        </div>

        <!-- MODAL -->

        <div style="
            position:fixed;
            top:50%;
            left:50%;
            transform:translate(-50%, -50%);
            width:320px;
            background:white;
            border-radius:8px;
            padding:20px;
            box-shadow:0 0 10px rgba(0,0,0,0.3);
            z-index:9999;
        ">

            <h3>#{cc.attrs.title}</h3>

            <p>#{cc.attrs.message}</p>

            <h:commandButton value="Confirm"
                             action="#{cc.attrs.confirmAction}">

                <f:ajax execute="@form"
                        render="@form"/>

            </h:commandButton>

            <h:commandButton value="Cancel"
                             action="#{cc.attrs.cancelAction}">

                <f:ajax execute="@this"
                        render="@form"/>

            </h:commandButton>

        </div>

    </h:panelGroup>

</cc:implementation>

</html>
