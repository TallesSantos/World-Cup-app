<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:cc="jakarta.faces.composite"
      xmlns:p="http://primefaces.org/ui"
>

<cc:interface>
    <cc:attribute
            name="hideBackButton"
            required="false"/>

</cc:interface>

<cc:implementation>

    <h:panelGroup>
        <!-- MODAL -->

        <div style="
            width:320px;
            border-radius:8px;
            padding:20px;
        ">

            <h3>Header Panel</h3>

            <h:button value="&#8592; Back"
                      outcome="/backoffice/index.xhtml"
                      style="margin-bottom:16px;"
                      rendered="#{not cc.attrs.hideBackButton}"
            />

            <h:form>

            <p:selectOneMenu value="#{themeBean.theme}">

                <f:selectItem itemLabel="Saga" itemValue="saga"/>
                <f:selectItem itemLabel="Arya" itemValue="arya"/>
                <f:selectItem itemLabel="Vela" itemValue="vela"/>

                <p:ajax oncomplete="window.location.reload()" />

            </p:selectOneMenu>
            </h:form>
        </div>

    </h:panelGroup>

</cc:implementation>

</html>
